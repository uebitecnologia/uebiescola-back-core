name: CI/CD - Core Service

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        run: chmod +x mvnw && ./mvnw package -DskipTests -q

      - name: Run tests
        run: ./mvnw test -q || true
        env:
          DB_URL: ""
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
          RABBITMQ_HOST: localhost

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/uebitecnologia/uebiescola-back-core:latest
            ghcr.io/uebitecnologia/uebiescola-back-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/uebiescola

            IMAGE=ghcr.io/uebitecnologia/uebiescola-back-core
            CONTAINER=uebi-core
            SERVICE=core

            # 1. Tag imagem atual como :previous (rollback point)
            docker tag $IMAGE:latest $IMAGE:previous 2>/dev/null || true

            # 2. Pull nova imagem e aponta :latest
            docker pull $IMAGE:${{ github.sha }}
            docker tag $IMAGE:${{ github.sha }} $IMAGE:latest

            # 3. Recreate + restart gateway (re-resolve DNS) + flush cache Redis
            docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate $SERVICE
            docker restart uebi-gateway || true
            docker exec uebi-redis redis-cli FLUSHALL >/dev/null 2>&1 || true

            # 4. Health check com timeout de 5min
            echo "Aguardando $CONTAINER ficar healthy..."
            HEALTHY=false
            for i in $(seq 1 60); do
              STATUS=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' $CONTAINER 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
                if [ "$STATUS" = "healthy" ]; then
                  HEALTHY=true
                  echo "✅ $CONTAINER healthy em $((i*5))s"
                  break
                fi
              fi
              echo "  [$i/60] Status: $STATUS"
              sleep 5
            done

            # 5. Rollback se nao ficou healthy
            if [ "$HEALTHY" != "true" ]; then
              echo "❌ $CONTAINER nao ficou healthy em 5min - ROLLBACK para :previous"
              docker logs $CONTAINER 2>&1 | tail -30
              if docker image inspect $IMAGE:previous >/dev/null 2>&1; then
                docker tag $IMAGE:previous $IMAGE:latest
                docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate $SERVICE
                docker restart uebi-gateway || true
                docker exec uebi-redis redis-cli FLUSHALL >/dev/null 2>&1 || true
                echo "⏪ Rollback executado"
              else
                echo "⚠️ Sem imagem :previous, nao foi possivel rollback"
              fi
              exit 1
            fi

            echo "✅ Deploy $SERVICE concluido com sucesso"
            docker image prune -f || true
