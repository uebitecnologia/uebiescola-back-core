name: CI/CD - Core Service

on:
  push:
    branches: [main, master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build
        run: chmod +x mvnw && ./mvnw package -DskipTests -q

      - name: Run tests
        run: ./mvnw test -q || true
        env:
          DB_URL: ""
          DB_USER: test
          DB_PASSWORD: test
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-for-hmac-sha256-algorithm
          RABBITMQ_HOST: localhost

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/uebitecnologia/uebiescola-back-core:latest
            ghcr.io/uebitecnologia/uebiescola-back-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd /opt/uebiescola

            # Pull nova imagem
            docker pull ghcr.io/uebitecnologia/uebiescola-back-core:${{ github.sha }}
            docker tag ghcr.io/uebitecnologia/uebiescola-back-core:${{ github.sha }} ghcr.io/uebitecnologia/uebiescola-back-core:latest

            # Restart apenas este container
            docker compose -f docker-compose.prod.yml up -d --no-deps core

            # Health check
            echo "Aguardando serviço ficar healthy..."
            sleep 30
            if curl -sf --max-time 10 http://localhost:8081/actuator/health > /dev/null 2>&1; then
              echo "✅ Core Service deployed successfully!"
            else
              echo "❌ Core Service health check failed!"
              exit 1
            fi

            docker image prune -f
