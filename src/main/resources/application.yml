server:
  port: 8081
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/uebiescola_db}
    username: ${DB_USER:uebi}
    password: ${DB_PASSWORD:uebiadmin}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
uebi:
  jwt:
    secret: ${JWT_SECRET:mMEyIgy1ucHbW3LmgrWBWypFcz5pEFGGSMIUlrTTeiri3oUSaUbpa2uOW27r1aSE}
    expiration: 28800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always