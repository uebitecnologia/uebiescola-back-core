server:
  port: 8081
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/uebiescola_db}
    username: ${DB_USER:uebi}
    password: ${DB_PASSWORD:uebiadmin}
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  cache:
    type: ${SPRING_CACHE_TYPE:simple}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      connect-timeout: 2000ms
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  mail:
    from: ${APP_MAIL_FROM:noreply@uebiescola.com.br}
    frontend-url: ${APP_MAIL_FRONTEND_URL:https://admin.uebiescola.com.br}
feign:
  plans-service:
    url: ${FEIGN_PLANS_SERVICE_URL:http://localhost:8082/api/v1}
  academic-service:
    url: ${FEIGN_ACADEMIC_SERVICE_URL:http://localhost:8084/api/v1/academic}
  finance-service:
    url: ${FEIGN_FINANCE_SERVICE_URL:http://localhost:8083/api/v1}

uebi:
  jwt:
    secret: ${JWT_SECRET:dev-insecure-do-not-use-in-production-set-JWT_SECRET-env-var-0123456789abcdef}
    expiration: 28800000

loki:
  url: ${LOKI_URL:http://loki:3100}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
# Swagger UI servido via gateway sob o prefixo do servico
springdoc:
  swagger-ui:
    path: /api/v1/core/swagger.html
    config-url: /api/v1/core/api-docs/swagger-config
    url: /api/v1/core/api-docs
  api-docs:
    path: /api/v1/core/api-docs
